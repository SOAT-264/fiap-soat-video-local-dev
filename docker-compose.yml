# Full local development environment for infra, gateway and observability
# App services below are optional and disabled by default via profile `compose-apps`
# Use start.ps1 to run auth/jobs/notifications/video on Kubernetes local-dev overlays

include:
  - path: ../fiap-soat-video-obs/docker-compose.yml

services:
  # ==================== INFRASTRUCTURE ====================

  # Auth Service Database
  postgres-auth:
    image: postgres:16-alpine
    container_name: vp-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
      - ./scripts/sql/init-auth-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - video-processor-network

  # Video Service Database
  postgres-video:
    image: postgres:16-alpine
    container_name: vp-postgres-video
    environment:
      POSTGRES_DB: video_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres-video-data:/var/lib/postgresql/data
      - ./scripts/sql/init-video-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d video_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - video-processor-network

  # Job Service Database
  postgres-job:
    image: postgres:16-alpine
    container_name: vp-postgres-job
    environment:
      POSTGRES_DB: job_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5434:5432"
    volumes:
      - postgres-job-data:/var/lib/postgresql/data
      - ./scripts/sql/init-job-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - video-processor-network

  # Notification Service Database
  postgres-notification:
    image: postgres:16-alpine
    container_name: vp-postgres-notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5435:5432"
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data
      - ./scripts/sql/init-notification-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - video-processor-network

  # Shared Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vp-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - video-processor-network

  # LocalStack for AWS Services
  localstack:
    image: localstack/localstack:latest
    container_name: vp-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,sns,ses
      - DEBUG=0
      - DATA_DIR=/var/lib/localstack/data
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/linux/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - video-processor-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aws.rule=Host(`aws.localhost`)"
      - "traefik.http.routers.aws.entrypoints=web"
      - "traefik.http.services.aws.loadbalancer.server.port=4566"

  # ==================== MICROSERVICES ====================

  # Auth Service
  auth-service:
    build:
      context: ..
      dockerfile: fiap-soat-video-auth/Dockerfile
    container_name: vp-auth-service
    profiles:
      - compose-apps
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres123@postgres-auth:5432/auth_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=dev-jwt-secret-key-change-in-production
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRY_HOURS=24
      - LOG_LEVEL=DEBUG
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - video-processor-network
    ports:
      - "8001:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`auth.localhost`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.services.auth.loadbalancer.server.port=8000"

  # Video Service
  video-service:
    build:
      context: ..
      dockerfile: fiap-soat-video-service/Dockerfile
    container_name: vp-video-service
    profiles:
      - compose-apps
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres123@postgres-video:5432/video_db
      - REDIS_URL=redis://redis:6379/1
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - S3_BUCKET=video-uploads
      - SNS_TOPIC_ARN=arn:aws:sns:us-east-1:000000000000:video-events
      - AUTH_SERVICE_URL=http://auth-service:8000
      - LOG_LEVEL=DEBUG
    depends_on:
      postgres-video:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - video-processor-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.video.rule=Host(`video.localhost`)"
      - "traefik.http.routers.video.entrypoints=web"
      - "traefik.http.services.video.loadbalancer.server.port=8000"

  # Notification Service
  notification-service:
    build:
      context: ..
      dockerfile: fiap-soat-video-notifications/Dockerfile
    container_name: vp-notification-service
    profiles:
      - compose-apps
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres123@postgres-notification:5432/notification_db
      - REDIS_URL=redis://redis:6379/3
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/notification-queue
      - SQS_NOTIFICATION_QUEUE_URL=http://localstack:4566/000000000000/notification-queue
      - SES_SENDER_EMAIL=noreply@videoprocessor.local
      - AUTH_SERVICE_URL=http://auth-service:8000
      - LOG_LEVEL=DEBUG
    depends_on:
      postgres-notification:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - video-processor-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notify.rule=Host(`notify.localhost`)"
      - "traefik.http.routers.notify.entrypoints=web"
      - "traefik.http.services.notify.loadbalancer.server.port=8000"

  # Notification Worker
  notification-worker:
    build:
      context: ..
      dockerfile: fiap-soat-video-notifications/Dockerfile
    container_name: vp-notification-worker
    profiles:
      - compose-apps
    command: ["python", "-m", "notification_service.infrastructure.adapters.input.sqs_consumer"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres123@postgres-notification:5432/notification_db
      - REDIS_URL=redis://redis:6379/3
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - SQS_NOTIFICATION_QUEUE_URL=http://localstack:4566/000000000000/notification-queue
      - SES_SENDER_EMAIL=noreply@videoprocessor.local
      - AUTH_SERVICE_URL=http://auth-service:8000
      - LOG_LEVEL=DEBUG
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres-notification:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - video-processor-network

  # ==================== API GATEWAY ====================

  # Traefik API Gateway
  traefik:
    image: traefik
    container_name: vp-traefik
    ports:
      - "80:80"
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.traefik.address=:8080"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addentrypointslabels=true"
      - "--metrics.prometheus.addserviceslabels=true"
      - "--metrics.prometheus.addrouterslabels=true"
      - "--accesslog=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    depends_on:
      - localstack
    networks:
      - video-processor-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.routers.traefik.service=api@internal"

volumes:
  postgres-auth-data:
  postgres-video-data:
  postgres-job-data:
  postgres-notification-data:
  redis-data:
  localstack-data:

networks:
  video-processor-network:
    name: video-processor-network
    driver: bridge
